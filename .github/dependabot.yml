version: 2
updates:
  # Keep the pinned GitHub Actions current (they run on Node 24 as of #1).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]

  # Keep Python deps current. Uses the "uv" ecosystem (uv.lock + pyproject.toml),
  # not "pip". Group minor/patch into one PR to keep the queue quiet; majors
  # come through as individual PRs for a closer look.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
