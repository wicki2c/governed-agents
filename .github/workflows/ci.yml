name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch)
# so we don't burn Actions minutes on stale commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Tests
        run: uv run pytest -q
      - name: Audit dependencies (pip-audit)
        # A governance/security harness should scan its own dependency tree.
        # Audits the full locked set (incl. dev deps) against the advisory DB;
        # a known CVE fails the build.
        run: |
          uv export --format requirements-txt --no-emit-project -o "$RUNNER_TEMP/reqs.txt"
          uvx pip-audit -r "$RUNNER_TEMP/reqs.txt"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
